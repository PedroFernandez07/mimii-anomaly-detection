      <stop offset="0%" style="stop-color:#9e6a03"/><stop offset="100%" style="stop-color:#d29922"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6e40c9"/><stop offset="100%" style="stop-color:#8957e5"/>
