  <text x="542" y="126" text-anchor="middle" font-size="10" fill="#8b949e">Temporal (15D) · PSD/Welch (25D)</text>
  <text x="542" y="140" text-anchor="middle" font-size="10" fill="#8b949e">Onsets (10D) · MFCCs+Delta (30D)</text>
  <text x="542" y="155" text-anchor="middle" font-size="10" fill="#3fb950">Vector 80D · SR=8kHz · Nyquist=4kHz</text>
  <line x1="625" y1="125" x2="668" y2="125" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#arrow)"/>
