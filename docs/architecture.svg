  <text x="160" y="242" text-anchor="middle" font-size="10" fill="#3fb950">1. LOF k=20   AUC=0.906</text>
  <text x="360" y="242" text-anchor="middle" font-size="10" fill="#8b949e">2. LOF k=5    AUC=0.887</text>
  <text x="160" y="258" text-anchor="middle" font-size="10" fill="#8b949e">3. One-Class SVM  AUC=0.748</text>
  <text x="360" y="258" text-anchor="middle" font-size="10" fill="#8b949e">4. Isolation Forest  AUC=0.763</text>
  <text x="254" y="278" text-anchor="middle" font-size="10" fill="#d29922">Umbral optimizado: Recall mayor o igual a 0.90</text>
  <!-- Row 3 -->
  <line x1="752" y1="292" x2="752" y2="325" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#arrow)"/>
