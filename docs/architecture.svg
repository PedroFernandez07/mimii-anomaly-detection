  <text x="137" y="126" text-anchor="middle" font-size="10" fill="#8b949e">4,205 archivos WAV</text>
  <text x="137" y="140" text-anchor="middle" font-size="10" fill="#8b949e">16 kHz · 10 seg · +6dB SNR</text>
  <text x="137" y="155" text-anchor="middle" font-size="10" fill="#8b949e">id_00 · id_02 · id_04 · id_06</text>
