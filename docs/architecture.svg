  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#58a6ff">Sistema de Deteccion de Anomalias Acusticas - Arquitectura End-to-End</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#8b949e">MIMII Dataset · Bombas Industriales · +6 dB SNR · UNI Mecatronica</text>
  <line x1="60" y1="66" x2="840" y2="66" stroke="#30363d" stroke-width="1"/>
  <!-- Row 1 -->
