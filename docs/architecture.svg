  <text x="752" y="140" text-anchor="middle" font-size="10" fill="#8b949e">Resistente a outliers</text>
  <text x="752" y="155" text-anchor="middle" font-size="10" fill="#8b949e">IQR-based scaling</text>
  <line x1="752" y1="165" x2="752" y2="198" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#arrow)"/>
