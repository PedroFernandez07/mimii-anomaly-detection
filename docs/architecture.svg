  <text x="755" y="259" text-anchor="middle" font-size="10" fill="#8b949e">novelty=True · One-Class Learning</text>
  <text x="755" y="274" text-anchor="middle" font-size="10" fill="#d2a8ff">AUC=0.891 · Recall=0.901 · F1=0.690</text>
