  <line x1="615" y1="367" x2="668" y2="367" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="670" y="327" width="165" height="80" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5" filter="url(#shadow)"/>
