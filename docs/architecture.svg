  <rect x="260" y="85" width="155" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="260" y="85" width="155" height="8" rx="4" fill="url(#blueGrad)"/>
  <text x="337" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#79c0ff">Ingesta &amp; Inventario</text>
  <text x="337" y="126" text-anchor="middle" font-size="10" fill="#8b949e">os.walk() recursivo</text>
  <text x="337" y="140" text-anchor="middle" font-size="10" fill="#8b949e">DataFrame Pandas</text>
  <text x="337" y="155" text-anchor="middle" font-size="10" fill="#8b949e">label · machine_id · path</text>
  <line x1="415" y1="125" x2="458" y2="125" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="437" y="118" text-anchor="middle" font-size="9" fill="#58a6ff">df</text>
  <rect x="460" y="85" width="165" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="460" y="85" width="165" height="8" rx="4" fill="url(#greenGrad)"/>
